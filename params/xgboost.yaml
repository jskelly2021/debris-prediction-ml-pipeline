classifier:
  default_params:
    n_estimators: 1000
    learning_rate: 0.05
    max_depth: 9
    subsample: 0.6
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 0.1

  params_dist:
    n_estimators: [50, 100, 1000]
    learning_rate: [0.02, 0.05]
    max_depth: [3, 6, 9]
    subsample: [0.6, 0.8]
    colsample_bytree: [0.6, 0.8]
    reg_alpha: [0.0, 1.0]
    reg_lambda: [0.0, 0.1]

regressor:
  default_params:
    n_estimators: 500
    learning_rate: 0.03
    max_depth: 3
    subsample: 0.6
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0

  params_dist:
    n_estimators: [100, 500, 1000]
    learning_rate: [0.02, 0.05]
    max_depth: [3, 6, 9]
    subsample: [0.6, 0.8]
    colsample_bytree: [0.6, 0.8]
    reg_alpha: [0.0, 1.0]
    reg_lambda: [0.0, 0.1]