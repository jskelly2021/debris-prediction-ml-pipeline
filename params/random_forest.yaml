classifier:
  default_params:
    n_estimators: 300
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: sqrt
    bootstrap: true
    n_jobs: -1
    random_state: 12

  params_dist:
    n_estimators: [100, 300, 500]
    max_depth: [null, 10, 20, 30]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    max_features: [sqrt, log2, 0.5]
    bootstrap: [true, false]

regressor:
  default_params:
    n_estimators: 300
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: sqrt
    bootstrap: true
    n_jobs: -1
    random_state: 12

  params_dist:
    n_estimators: [100, 300, 500]
    max_depth: [null, 10, 20, 30]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    max_features: [sqrt, log2, 0.5]
    bootstrap: [true, false]
