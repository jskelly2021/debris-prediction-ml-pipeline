classifier:
  default_params:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 3
    min_samples_split: 2
    min_samples_leaf: 1
    subsample: 1.0
    max_features: null
    random_state: 12

  params_dist:
    n_estimators: [100, 300, 500]
    learning_rate: [0.03, 0.05, 0.1]
    max_depth: [2, 3, 5]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    subsample: [0.8, 1.0]
    max_features: [null, sqrt, log2]

