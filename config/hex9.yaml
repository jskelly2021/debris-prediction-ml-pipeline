data_path: data/hex9.csv
output_path: outputs/hex9

class_target_cols:
  - has_VG_debris
  - has_CD_debris

reg_target_cols:
  - VolVG_sum
  - VolCD_sum

drop_cols:
  - OBJECTID
  - GRID_ID
  - VolCD
  - VolCD_med
  - VolCD_sum
  - VolVG
  - VolVG_med
  - VolVG_sum
  - has_VG_debris
  - has_CD_debris

label_names:
  - VG
  - CD

smote: true
scale_pos_weight: false
log_regression_target: true
positive_only_regression: true

class_params_dist:
  n_estimators: [200, 600, 1000]
  learning_rate: [0.01, 0.03, 0.05, 0.1]
  max_depth: [3, 6, 9, 12]
  min_child_weight: [1, 3, 5]
  subsample: [0.3, 0.6, 0.8, 1.0]
  colsample_bytree: [0.6, 0.8, 1.0]
  reg_alpha: [0.0, 0.1, 1.0]
  reg_lambda: [0.0, 0.1, 1.0]

reg_params_dist:
  n_estimators: [100, 300, 1000]
  learning_rate: [0.03, 0.05, 0.1]
  max_depth: [3, 6, 9]
  min_child_weight: [1, 3]
  subsample: [0.6, 0.8, 1.0]
  colsample_bytree: [0.6, 0.8, 1.0]
  reg_alpha: [0.0, 0.1, 1.0]
  reg_lambda: [0.0, 0.1, 1.0]

class_default_params:
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 9
  subsample: 0.6
  colsample_bytree: 0.8
  reg_alpha: 0.0
  reg_lambda: 0.1

reg_default_params:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 3
  subsample: 0.6
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
