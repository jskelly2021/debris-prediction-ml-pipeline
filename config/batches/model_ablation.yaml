batch_name: model_ablation_h9
base_config: config/h9_v4.yaml
output_root: outputs/batches

experiments:
  - name: xgb
    run_id: xgb
    overrides:
      training:
        smote: true
        scale_pos_weight: false
      models:
        classifier_model: xgboost
        regressor_model: xgboost
        classifier_params_path: params/xgboost.yaml
        regressor_params_path: params/xgboost.yaml

  - name: ada
    run_id: ada
    overrides:
      training:
        smote: true
        scale_pos_weight: false
      models:
        classifier_model: adaboost
        regressor_model: adaboost
        classifier_params_path: params/adaboost.yaml
        regressor_params_path: params/adaboost.yaml

  - name: rf
    run_id: rf
    overrides:
      training:
        smote: true
        scale_pos_weight: false
      models:
        classifier_model: random_forest
        regressor_model: random_forest
        classifier_params_path: params/random_forest.yaml
        regressor_params_path: params/random_forest.yaml

  - name: gb
    run_id: gb
    overrides:
      training:
        smote: true
        scale_pos_weight: false
      models:
        classifier_model: gradient_boosting
        regressor_model: gradient_boosting
        classifier_params_path: params/gradient_boosting.yaml
        regressor_params_path: params/gradient_boosting.yaml

  - name: extree
    run_id: extree
    overrides:
      training:
        smote: true
        scale_pos_weight: false
      models:
        classifier_model: extra_trees
        regressor_model: extra_trees
        classifier_params_path: params/extra_trees.yaml
        regressor_params_path: params/extra_trees.yaml
