data_path: data/hex9_v4.csv
output_path: outputs/hex9_v4

class_target_cols:
  # - Bin_CD
  # - Bin_VG
  - Bin_Both

reg_target_cols:
  # - VolCD_sum
  # - VolVG_sum
  - VolBoth_sum

drop_cols:
  # Repetitive/Identifier Features
  - OBJECTID_x
  - GRID_ID
  - num_story_med
  - sqft_med
  - sqft_sum
  - found_ht_med
  - val_struct_med
  - val_struct_sum
  - val_cont_med
  - val_cont_sum
  - age_med

  # Targets
  - VolCD
  - VolVG
  - VolCD_sum
  - VolVG_sum
  - VolBoth_sum
  - Bin_CD
  - Bin_VG
  - Bin_Both

  # Variable Drop Features

categorical_cols:
  - fld_zone
  - landcover
  - landuse
  - evac_degree

feature_cols_to_log:
  - sqft
  - val_struct
  - val_cont

label_names:
  # - CD
  # - VG
  - BT

outlier_threshold: 
smote: false
scale_pos_weight: true
log_features: true
log_target_reg: false

class_params_dist:
  n_estimators: [200, 600, 1000]
  learning_rate: [0.01, 0.03, 0.05, 0.1]
  max_depth: [3, 6, 9, 12]
  min_child_weight: [1, 3, 5]
  subsample: [0.3, 0.6, 0.8, 1.0]
  colsample_bytree: [0.6, 0.8, 1.0]
  reg_alpha: [0.0, 0.1, 1.0]
  reg_lambda: [0.0, 0.1, 1.0]

reg_params_dist:
  n_estimators: [100, 300, 1000]
  learning_rate: [0.03, 0.05, 0.1]
  max_depth: [3, 6, 9]
  min_child_weight: [1, 3]
  subsample: [0.6, 0.8, 1.0]
  colsample_bytree: [0.6, 0.8, 1.0]
  reg_alpha: [0.0, 0.1, 1.0]
  reg_lambda: [0.0, 0.1, 1.0]

class_default_params:
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 9
  subsample: 0.6
  colsample_bytree: 0.8
  reg_alpha: 0.0
  reg_lambda: 0.1

reg_default_params:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 3
  subsample: 0.6
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
